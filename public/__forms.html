<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Netlify Forms Decoy</title></head>
<body>
  <!-- Build-time-crawlable decoy so @netlify/plugin-nextjs registers the component-rendered "lead" form. Do not delete. -->
  <form name="lead" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="lead" />
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="business_type"></textarea>
    <input type="text" name="category" />
  </form>
</body>
</html>
